<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión — CineManager</title>
    <meta name="description" content="Accede a tu cuenta de CineManager para comprar entradas y gestionar tu perfil.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="/cinemanager/assets/styles.css" rel="stylesheet">
</head>

<body>
    <div id="navbar"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="cm-card p-4 p-md-5">
                    <h1 class="h3 fw-bold mb-1">Bienvenido de vuelta</h1>
                    <p class="text-secondary small mb-4">Entra para gestionar tus entradas.</p>
                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <input id="email" type="email" class="form-control" required autocomplete="email">
                            <div class="invalid-feedback">Introduce un correo válido.</div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input id="password" type="password" class="form-control" minlength="6" required
                                autocomplete="current-password">
                            <div class="invalid-feedback">Mínimo 6 caracteres.</div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check"><input id="remember" type="checkbox" class="form-check-input"><label
                                    for="remember" class="form-check-label small">Recuérdame</label></div>
                            <a href="#" class="small">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="btn cm-btn-primary w-100">Entrar</button>
                    </form>
                    <p class="text-center small text-secondary mt-4 mb-0">¿No tienes cuenta? <a
                            href="/cinemanager/registro.html">Regístrate</a></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/cinemanager/assets/data.js"></script>
    <script src="/cinemanager/assets/app.js"></script>
    <script>
        document.getElementById('navbar').innerHTML = CM_renderNavbar('login');
        document.getElementById('footer').innerHTML = CM_renderFooter();
        document.getElementById('loginForm').addEventListener('submit', e => {
            e.preventDefault();
            const f = e.currentTarget;
            if (!f.checkValidity()) { f.classList.add('was-validated'); return; }
            localStorage.setItem('cm_user', JSON.stringify({ email: email.value }));
            CM_toast('Sesión iniciada correctamente');
            setTimeout(() => location.href = '/cinemanager/perfil.html', 700);
        });
    </script>
</body>

</html>
