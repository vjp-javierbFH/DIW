<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi perfil — CineManager</title>
    <meta name="description" content="Gestiona tus datos, entradas activas e historial de compras.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="/cinemanager/assets/styles.css" rel="stylesheet">
</head>

<body>
    <div id="navbar"></div>

    <main class="container py-5">
        <h1 class="h3 fw-bold mb-4">Mi perfil</h1>
        <ul class="nav nav-tabs border-secondary mb-4" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabData"
                    role="tab">Datos</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabActive"
                    role="tab">Entradas activas</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabHistory"
                    role="tab">Historial</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tabData" role="tabpanel">
                <div class="cm-card p-4">
                    <form id="profileForm" class="row g-3">
                        <div class="col-md-6"><label class="form-label" for="pname">Nombre</label><input id="pname"
                                class="form-control" value="Mario Pérez"></div>
                        <div class="col-md-6"><label class="form-label" for="pemail">Email</label><input id="pemail"
                                type="email" class="form-control" value="mario@example.com"></div>
                        <div class="col-md-6"><label class="form-label" for="pphone">Teléfono</label><input id="pphone"
                                class="form-control" value="+34 600 000 000"></div>
                        <div class="col-md-6"><label class="form-label" for="pcity">Ciudad</label><input id="pcity"
                                class="form-control" value="Plasencia"></div>
                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn cm-btn-primary">Guardar cambios</button>
                            <button type="button" id="logoutBtn" class="btn cm-btn-outline">Cerrar sesión</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="tab-pane fade" id="tabActive" role="tabpanel">
                <div id="activeTickets" class="row g-3"></div>
            </div>

            <div class="tab-pane fade" id="tabHistory" role="tabpanel">
                <div class="cm-card p-3">
                    <table class="table cm-table mb-0">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Película</th>
                                <th>Sala</th>
                                <th>Butacas</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/cinemanager/assets/data.js"></script>
    <script src="/cinemanager/assets/app.js"></script>
    <script>
        document.getElementById('navbar').innerHTML = CM_renderNavbar('perfil');
        document.getElementById('footer').innerHTML = CM_renderFooter();

        // Mock entradas activas
        const active = [
            { id: 101, movieId: 1, room: "Sala 1 IMAX", date: "30 may 2026 · 22:15", seats: ["F4", "F5"], total: 19 },
            { id: 102, movieId: 4, room: "Sala 3 VIP", date: "02 jun 2026 · 21:30", seats: ["C7"], total: 12 },
        ];
        const cont = document.getElementById('activeTickets');
        const renderActive = () => {
            cont.innerHTML = active.length ? active.map(t => {
                const m = CM_findMovie(t.movieId);
                return `<div class="col-md-6"><div class="cm-card p-3 d-flex gap-3 align-items-center">
        <img src="${m.poster}" alt="" style="width:70px;height:100px;object-fit:cover;border-radius:8px">
        <div class="flex-grow-1">
          <h2 class="h6 mb-1">${m.title}</h2>
          <p class="small text-secondary mb-1">${t.room} · ${t.date}</p>
          <p class="small mb-0">Butacas: <strong>${t.seats.join(', ')}</strong> · <strong>${t.total.toFixed(2).replace('.', ',')} €</strong></p>
        </div>
        <button class="btn btn-sm cm-btn-outline" data-cancel="${t.id}" aria-label="Anular entrada"><i class="bi bi-x-circle"></i></button>
      </div></div>`;
            }).join('') : '<p class="text-secondary">No tienes entradas activas.</p>';
        };
        renderActive();
        cont.addEventListener('click', e => {
            const btn = e.target.closest('button[data-cancel]');
            if (!btn) return;
            if (!confirm('¿Anular esta entrada?')) return;
            const i = active.findIndex(x => x.id === Number(btn.dataset.cancel));
            active.splice(i, 1); renderActive(); CM_toast('Entrada anulada', 'warn');
        });

        // Historial
        document.getElementById('historyBody').innerHTML = [
            ["12/05/2026", "Oppenheimer", "Sala 2", "D3, D4", "15,00 €"],
            ["28/04/2026", "The Batman II", "Sala 4", "B7", "8,00 €"],
            ["03/04/2026", "Spider-Verse 3", "Sala 5", "A1, A2, A3", "21,00 €"],
        ].map(r => `<tr>${r.map((c, i) => `<td class="${i === 4 ? 'text-end' : ''}">${c}</td>`).join('')}</tr>`).join('');

        document.getElementById('profileForm').addEventListener('submit', e => { e.preventDefault(); CM_toast('Perfil actualizado'); });
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('cm_user'); CM_toast('Sesión cerrada', 'warn'); setTimeout(() => location.href = '/cinemanager/index.html', 600); });
    </script>
</body>

</html>
